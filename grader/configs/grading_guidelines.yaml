# ============================================================
# grader/configs/grading_guidelines.yaml
#
# Rule engine grading criteria and eBay JP harmonization.
# Derived from official Discogs grading guidelines and
# eBay JP seller conventions.
#
# Canonical schema extended with:
#   - Excellent (EX) grade — collector-aligned, between NM and VG+
#   - Generic grade — sleeve only, record has no original cover
#
# Deliberate deviations from official standards are
# documented inline. This file is the single source of
# truth for all grading logic.
#
# Track B (rule iteration): pair each behavioral change with regression
# tests in grader/tests/test_rule_engine.py and
# grader/tests/test_grade_analysis_slice.py — see grader/README.md
# "Rule-engine iteration loop".
# ============================================================

# ------------------------------------------------------------
# Canonical Grade Schema
# ------------------------------------------------------------
# Sleeve grades (8): includes Generic
# Media grades  (7): excludes Generic — never applies to media
#
# Generic is not ordinal — it describes sleeve type, not
# condition. It sits outside the condition scale and is
# excluded from grade_ordinal_map.
#
# Good corresponds to Discogs G/G+ (merged).
# Poor corresponds to Discogs P/F (merged).
# Japanese sellers do not list records below Very Good —
# Good and Poor grades will only appear in Discogs data.
# Excellent will only appear in eBay JP data.
# ------------------------------------------------------------
sleeve_grades:
  - Mint           # 1 — best
  - Near Mint      # 2
  - Excellent      # 3 — between NM and VG+, collector-aligned
  - Very Good Plus # 4
  - Very Good      # 5
  - Good           # 6 — corresponds to Discogs G/G+
  - Poor           # 7 — worst, includes Fair
  - Generic        # sleeve only — no original cover present

media_grades:
  - Mint           # 1 — best
  - Near Mint      # 2
  - Excellent      # 3
  - Very Good Plus # 4
  - Very Good      # 5
  - Good           # 6
  - Poor           # 7 — worst, includes Fair

# Ordinal map for condition grades only.
# Generic is intentionally excluded — it is not a condition.
grade_ordinal_map:
  Mint:           0
  Near Mint:      1
  Excellent:      2
  Very Good Plus: 3
  Very Good:      4
  Good:           5
  Poor:           6

grade_owners:
  Mint:           model         # model-owned; hard override removed (zero net benefit across full dataset)
  Near Mint:      model
  Excellent:      model
  Very Good Plus: model
  Very Good:      model
  Good:           model
  Poor:           rule_engine   # deterministic: catastrophic condition
  Generic:        rule_engine   # deterministic: sleeve only, keyword-driven

# ------------------------------------------------------------
# eBay JP Grade Harmonization
# ------------------------------------------------------------
# Japanese sellers do not list records below Very Good.
# Good and Poor will not appear in eBay JP training data —
# these classes are sourced from Discogs only.
# Excellent will not appear in Discogs marketplace data —
# sourced from eBay JP only.
#
# label_confidence: trust in this mapping (0.0–1.0).
# Used as a sample weight signal during training.
# flagged: true = non-obvious or ambiguous mapping.
# ------------------------------------------------------------
ebay_jp_harmonization:
  S:
    canonical: Mint
    flagged: false
    label_confidence: 1.00
    note: "Still sealed — unambiguous Mint by our convention"

  M-:
    canonical: Near Mint
    flagged: false
    label_confidence: 1.00
    note: "Unsealed, unused — clean Near Mint mapping"

  E+:
    canonical: Near Mint
    flagged: false
    label_confidence: 0.95
    note: "Flawless used item — Near Mint by any standard"

  E:
    canonical: Excellent
    flagged: false
    label_confidence: 0.95
    note: >
      Minor cosmetic wear only, sound unaffected.
      Maps to Excellent — sits between Near Mint and VG+
      in the collector-aligned canonical schema.

  E-:
    canonical: Excellent
    flagged: true
    label_confidence: 0.85
    note: >
      Maps to Excellent alongside E. Japanese sellers grade
      strictly and conservatively — E- describes very minor
      cosmetic wear that in practice sits closer to Near Mint
      than to Very Good Plus. Monitor during evaluation —
      if E- samples cluster with Near Mint predictions,
      consider splitting into separate mappings.

  VG+:
    canonical: Very Good Plus
    flagged: false
    label_confidence: 0.95
    note: >
      Direct equivalent to canonical Very Good Plus.
      Japanese sellers use VG+ to mean the same cosmetic-only
      defects that do not affect playback — consistent with
      the Discogs VG+ definition.

  VG:
    canonical: Very Good
    flagged: false
    label_confidence: 0.95
    note: >
      Direct equivalent to canonical Very Good.
      Note: Japanese sellers do not list records below Very Good.
      Good and Poor grades will not appear in eBay JP training
      data — these classes are Discogs-sourced only.

# ------------------------------------------------------------
# OBI Strip Handling
# ------------------------------------------------------------
# OBI strips (Japanese paper spine bands) are graded
# separately by JP sellers. Tracked as metadata only —
# not a grading target. OBI presence/condition affects
# collector value but is outside the sleeve/media schema.
# ------------------------------------------------------------
obi:
  track_as_metadata: true
  metadata_field: obi_condition
  grade_target: false

# ------------------------------------------------------------
# Grade Definitions and Rule Engine Signals
# ------------------------------------------------------------
# Structure per grade:
#   hard_signals:      any one triggers override (Mint/Poor/Generic)
#   supporting_signals: legacy fallback for both targets when per-target keys omitted
#   supporting_signals_sleeve / supporting_signals_media:
#     optional — when both are set, sleeve vs media use separate cue lists.
#     If only one of sleeve/media is set, the other falls back to supporting_signals.
#   forbidden_signals: legacy fallback for both targets
#   forbidden_signals_sleeve / forbidden_signals_media:
#     optional per-target forbiddens (same fallback rules as supporting).
#   min_supporting / max_supporting: legacy scalars for both targets
#   min_supporting_sleeve / min_supporting_media / max_supporting_sleeve /
#     max_supporting_media: optional per-target caps (override scalars when set).
#   rule_confidence_threshold:
#     model confidence below which rule override can fire.
#     At 1.0 (Poor, Generic), rule always fires regardless of model.
#
# Sleeve and media are graded independently.
# No cross-target logic — Poor sleeve does not affect media.
# Generic only applies to sleeve — never to media.
# ------------------------------------------------------------

# Maximum ordinal steps a soft override may jump upward.
# An override is an "upgrade" when the candidate grade has a lower ordinal
# (better condition) than the model's predicted grade.
# With max_soft_upgrade_steps: 1, Good (5) → VG+ (3) is blocked (Δ=2),
# but Good (5) → VG (4) is allowed (Δ=1).  Downgrades are never limited.
max_soft_upgrade_steps: 1

grades:
  Mint:
    applies_to: [sleeve, media]
    description: >
      Sealed record. Media condition unverifiable without opening.
      INTENTIONAL DEVIATION FROM OFFICIAL DISCOGS STANDARD:
      Official guidelines state sealed does not guarantee Mint.
      We override this by convention — sealed records are graded
      Mint since media condition cannot be assessed without
      opening the record. This is a known, documented design
      decision for this system.
    # NOTE: Mint is model-owned — these entries are NOT evaluated by
    # ``RuleEngine.check_hard_override`` (which iterates Generic, Poor
    # only). They are retained here as a curated signal lexicon for
    # future TF-IDF / feature-builder work that wants to reference
    # "sealed-ish" phrases without duplicating the list. If you want
    # Mint to fire hard overrides again, re-enable Mint in the loop at
    # the top of ``check_hard_override`` and add fixtures first.
    hard_signals:
      - sealed
      - factory sealed
      - still sealed
      - shrink wrapped
      - shrink intact
    supporting_signals:
      - unplayed
      - unopened
    forbidden_signals:
      # Boilerplate shrink mention without factory seal (common harmful override)
      - unsealed
      # not "opened" alone — matches "never opened" on sealed listings
      - opened copy
      - opened to inspect
      - opened shrink
      - shrink but opened
      - resealed
      - re-sealed
      - replaced shrink
      - shrink removed
      - shrink gone
      - partial shrink
      - no shrink
      # Generic / no original art — Mint priority must not beat Generic
      - generic sleeve
      - generic cover
      - inner sleeve only
      - no original cover
      - no original sleeve
      # Sealed copy but graded sleeve/box damage on Discogs (harmful Mint)
      - cutout
      - cut out
      - hole punch
      - corner ding
      - corner dings
      - notch cut
      - corner cut
      - damaged
      - split
      - crack
      - worn
      - writing
      - sticker
      - water damage
    min_supporting: 0
    rule_confidence_threshold: 0.90

  Near Mint:
    applies_to: [sleeve, media]
    description: >
      Nearly perfect. More than likely never played, or played
      once with no imperfections during playback. No obvious
      signs of wear. No folds, seam splits, scratches, or
      noticeable defects on cover or inserts.
    hard_signals: []
    supporting_signals_sleeve:
      - no marks
      - no defects
      - no wear
      - excellent condition
      - perfect condition
      - mint minus
      - like new
    supporting_signals_media:
      - never played
      - barely played
      - one play
      - no marks
      - no defects
      - no wear
      - excellent condition
      - perfect condition
      - mint minus
      - like new
    forbidden_signals_sleeve:
      - seam split
      - scratch
      - scratches
      - fold
      - worn
      - writing
      - tape
      - sticker
      - scuff
      - mold
      - stain
      - ringwear
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
      - hairline
      - hairlines
    forbidden_signals_media:
      - seam split
      - scratch
      - scratches
      - fold
      - surface noise
      - crackle
      - worn
      - writing
      - tape
      - sticker
      - warp
      - skip
      - skipping
      - scuff
      - mold
      - stain
      - ringwear
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
      - hairline
      - hairlines
    min_supporting_sleeve: 1
    min_supporting_media: 1
    rule_confidence_threshold: 0.85
    # §14b: real listings often say "no tape", "no stickers". Strip those
    # phrases before the forbidden check so they do not block the NM
    # soft override just because the seller explicitly disclaimed the
    # defect. ``sticker residue`` (sticker removed) is also non-blocking.
    forbidden_exceptions_sleeve:
      - sticker residue
      - no tape
      - no stickers
      - no sticker
      - without tape
      - without stickers
      - without sticker
    forbidden_exceptions_media:
      - sticker residue
      - no tape
      - no stickers
      - no sticker
      - without tape
      - without stickers
      - without sticker

  Excellent:
    applies_to: [sleeve, media]
    # Runtime: soft override to Excellent is off unless grader.yaml sets
    # rules.allow_excellent_soft_override: true (default is false; Discogs eval has no gold EX).
    description: >
      Collector EX (between Near Mint and Very Good Plus). Media:
      bright and shiny; may show visible surface wear, very minor
      marks/scuffs (e.g. from removing the record from a paper
      innersleeve). A few hairlines only obvious under raking light;
      nothing that should majorly affect play. Label clean and
      unmarked aside from light handling. Sleeve: faint corner
      creases/bumps, faint creases, minor abrasions; artwork clean
      and unworn. Intentionally cared-for copies. Corresponds to
      eBay JP E / E- in this project.
    hard_signals: []
    # "minor scuff" / "slight scuff" removed: word-boundary "scuff" forbidden below
    # would fire inside those phrases, so they'd be blocked anyway.
    supporting_signals_sleeve:
      - very minor wear
      - light marks
      - carefully handled
      - well cared for
      - hairline
      - hairlines
      - faint corner
      - faint crease
      - faint bump
      - clean and unmarked
      - minor abrasion
    supporting_signals_media:
      - very minor wear
      - light marks
      - carefully handled
      - well cared for
      - bright and shiny
      - raking light
      - hairline
      - hairlines
      - faint corner
      - faint crease
      - faint bump
      - clean and unmarked
      - minor abrasion
    forbidden_signals_sleeve:
      - scratches
      - scratch
      - scuff
      - scuffs
      - many hairlines
      - numerous hairlines
      - seam split
      - worn
      - writing
      - tape
      - sticker
      - mold
      - stain
      - stains
      - ringwear
      - ring wear
      - foxing
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
    forbidden_signals_media:
      - scratches
      - scratch
      - scuff
      - scuffs
      - many hairlines
      - numerous hairlines
      - surface noise
      - crackle
      - worn
      - writing
      - tape
      - sticker
      - warp
      - skip
      - skipping
      - mold
      - stain
      - stains
      - ringwear
      - ring wear
      - groove wear
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
    min_supporting_sleeve: 1
    min_supporting_media: 1
    max_supporting_sleeve: 2
    max_supporting_media: 3
    # Only downgrade NM → Excellent; never upgrade VG+ or VG up to Excellent.
    only_downgrade: true
    # Soft override fires when model_confidence < threshold; lower = fewer rule upgrades
    rule_confidence_threshold: 0.78
    # Exception phrases: stripped from text before the forbidden check so they
    # cannot activate a forbidden signal (e.g. "sticker residue" should not
    # trigger the "sticker" forbidden — residue only means the sticker is gone).
    # Negated mentions ("no tape", "no stickers") are added so listings that
    # explicitly disclaim these defects do not get their NM override blocked.
    forbidden_exceptions_sleeve:
      - sticker residue
      - no tape
      - no stickers
      - no sticker
      - without tape
      - without stickers
      - without sticker
    forbidden_exceptions_media:
      - sticker residue
      - no tape
      - no stickers
      - no sticker
      - without tape
      - without stickers
      - without sticker

  Very Good Plus:
    applies_to: [sleeve, media]
    description: >
      Media: visible surface wear; more obvious hairlines/scuffs
      but still need close inspection; cover only part of the
      surface; good luster. Labels may have minor imperfections
      (spindle marks, small bubbling, etc.). May play with light
      surface noise, intermittent light ticks, occasional light pop —
      less likely to harm sound quality. Sleeve: more wear than EX —
      edgewear, corner dings, rubbing/pigment loss, smaller edge
      creases; no seam splits or cutouts; possible light fading,
      light foxing, small indentations, light abrasions; light
      ringwear or disc impressions in raking light only. Not VG+:
      open seam splits, spine splits, cutouts, heavy foxing, groove
      wear, or sleeve wrinkles (those trend VG+→VG).
    hard_signals: []
    supporting_signals_sleeve:
      - light scuff
      - slight scuff
      - very light scratch
      - minor wear
      - cosmetic wear
      - turned-up corners
      - light wear
      - hairline
      - hairlines
      - edgewear
      - edge wear
      - corner ding
      - light foxing
      - light ringwear
      - light ring wear
      - smaller creases
      - light stain
    supporting_signals_media:
      - plays perfectly
      - plays great
      - light scuff
      - slight scuff
      - very light scratch
      - minor wear
      - cosmetic wear
      - turned-up corners
      - light wear
      # hairline/hairlines removed: too common/weak to confirm VG+ on their own;
      # "few light hairlines" is normal VG+ and should not trigger an upgrade
      - good luster
      - light tick
      - intermittent
      - spindle mark
      - spindle marks
    forbidden_signals_sleeve:
      - surface noise
      - deep scratch
      - skipping
      - skip
      - crackle
      - groove wear
      - tape
      - sticker
      - significant wear
      - heavy wear
      - mold
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
      - seam split
      - spine split
      - cutout
      - cut out
      - promo hole
      - hole punch
      - heavy foxing
      - heavier foxing
      - wrinkle
      - wrinkles
    forbidden_signals_media:
      - surface noise
      - deep scratch
      - skipping
      - skip
      - crackle
      - tape
      - sticker
      - significant wear
      - heavy wear
      - warp
      - mold
      - groove wear
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
    min_supporting_sleeve: 2
    min_supporting_media: 2
    max_supporting_sleeve: 3
    max_supporting_media: 2
    rule_confidence_threshold: 0.85
    # "sticker residue" means the sticker was removed — not a full sticker presence —
    # so it should not trigger the "sticker" forbidden and block a VG+ override.
    forbidden_exceptions_sleeve:
      - sticker residue
    forbidden_exceptions_media:
      - sticker residue

  Very Good:
    applies_to: [sleeve, media]
    description: >
      Media: hairlines/scuffs over much of the surface; possible
      tiny non-raised scratches; surface may dull; groove wear may
      show. More than occasional surface noise, pops, ticks, or
      persistent (but not overpowering) crackle — still no skips.
      Labels: small tears, tape marks, larger writing, spindle wear.
      Sleeve: worn; corner damage/creases; scratches/gouges;
      larger creases/bends; seams starting to split or discreet
      clear-tape repair; moderate ringwear; heavier foxing,
      yellowing, larger marks; small-area water waviness. Also
      covers “in-between” copies: numerous hairlines, handful of
      non-raised scratches, 1–2 small raised scratches with only
      light pops — looks rough but not trashed; noise not through
      the whole record; music still over flaws. Merged Discogs VG
      in this schema.
    hard_signals: []
    supporting_signals_sleeve:
      - surface noise
      - audible noise
      - noticeable wear
      - light scratches
      - writing on label
      - tape mark
      - tape marks
      - tape residue
      - tape on cover
      - tape on label
      - tape on spine
      - tape on back
      - clear-tape
      - tape repair
      # sticker residue omitted — residue only (sticker removed) is VG+, not VG
      - visible scratches
      - groove wear
      # Singular / short seller phrasing (Discogs-style) — rubric VG, not G / VG+
      - disc has scratch
      - record has scratch
      - vinyl has scratch
      - lp has scratch
      # Sleeve-only wear (same note often lists disc + jacket)
      # wrinkle/wrinkles removed — a single wrinkle is VG+ level, not VG
      - persistent
      - dull
      - moderate ringwear
      - moderate ring wear
      - heavier foxing
      - starting to split
      - unobtrusively repaired
      - archival
      - gouge
      - gouges
      - larger crease
      - more than occasional
      - tiny scratch
      - seam split
      - spine split
      - numerous hairlines
    # Media: omit jacket-only cues so sleeve defects / "cassette tape" don't move disc grade
    supporting_signals_media:
      - surface noise
      - audible noise
      - noticeable wear
      - plays with noise
      - light scratches
      - writing on label
      - tape mark
      - tape marks
      - tape residue
      - tape on cover
      - tape on label
      - tape on spine
      - tape on back
      - clear-tape
      - tape repair
      # sticker residue omitted — residue only (sticker removed) is VG+, not VG
      # writing on label removed — label writing doesn't affect disc playback (VG+ acceptable)
      - visible scratches
      - groove wear
      - disc has scratch
      - record has scratch
      - vinyl has scratch
      - lp has scratch
      - persistent
      - dull
      - more than occasional
      - tiny scratch
      - numerous hairlines
      - gouge
      - gouges
      - heavier foxing
    forbidden_signals_sleeve:
      - skipping
      - skip
      - heavily worn
      - heavy scratches
      - crackling
      - significant groove wear
      - surface noise throughout
      - noise throughout
      - crackle throughout
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
    forbidden_signals_media:
      - skipping
      - skip
      - heavily worn
      - heavy scratches
      - crackling
      - badly warped
      - significant groove wear
      - surface noise throughout
      - noise throughout
      - crackle throughout
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
    min_supporting_sleeve: 1
    min_supporting_media: 1
    max_supporting_sleeve: 3
    max_supporting_media: 4
    rule_confidence_threshold: 0.80

  Good:
    applies_to: [sleeve, media]
    description: >
      G / G+ merged. Media: many notable marks/scratches; plays
      through; significant surface noise or groove wear; heavy
      crackle, pops, clicks — tipping point where noise competes
      with music; label worn/torn. Sleeve: significant ringwear,
      heavy writing, failed tape/sticker removal damage; seam splits
      larger than ~6 inches up to full-side splits; heavy water
      damage or cover peeling. Also: one or two major sleeve issues
      or many small ones stacking to “pretty rough”; larger stains.
      “Foggy/cloudy/hazy” vinyl stays Good-level (or Poor if
      catastrophic). Discogs G and G+ both map here.
    hard_signals: []
    supporting_signals_sleeve:
      - seam split
      - spine split
      - writing
      - tape
      - pasted tape
      - pasted tapes
      - significant ring
      - heavy ringwear
      - heavy ring wear
      - peeling
      - heavy water
      - heavy stain
      - pretty rough
      - pretty bad
      - visible wear
      - heavy wear
      - numerous hairlines
    supporting_signals_media:
      - significant surface noise
      - surface noise throughout
      - noise throughout
      - crackle throughout
      - heavy scratches
      - crackling
      - crackle
      - visible wear
      - heavy wear
      - pasted tape
      - pasted tapes
      - plays through
      - foggy
      - cloudy
      - haze
      - hazy
      - clouding
      - milky
      - opaque
      - numerous hairlines
    forbidden_signals_sleeve:
      - skipping
      - skip
      - cracked
      - water damage
      - water damaged
    forbidden_signals_media:
      - skipping
      - skip
      - badly warped
      - cracked
      - water damage
      - water damaged
      - won't play
      - does not play
      - unplayable
    min_supporting_sleeve: 2
    min_supporting_media: 2
    max_supporting_sleeve: 9
    max_supporting_media: 7
    rule_confidence_threshold: 0.80

  Poor:
    applies_to: [sleeve, media]
    description: >
      Catastrophic condition. Cracked, badly warped, skipping,
      or otherwise unplayable. Cover may be water damaged,
      heavily marred, or fully split. Includes Fair (F) grade.
      Rule engine owns this grade entirely — hard signals are
      split into ``strict`` (any single match fires) and
      ``cosignal`` (requires another distinct signal from the
      same grade's strict or cosignal list as corroboration).
      Policy on skips: an **affirmative** playback skip (any
      phrasing that asserts the disc actually skips, including
      ``skip``, ``skips``, ``skipping``, ``skipped``,
      ``repeating skip``, etc.) is strict Poor: Good's rubric
      says the disc "plays through", so the model may label
      such a note Good, but the rule is allowed to hold Poor.
      **Negated, qualified, or list boilerplate** that merely
      mentions the word (e.g. "no skips", "no jump / skip /
      repeat", "without any skips", "does not skip", slash or
      "or … skipping" denials) must **not** fire Poor — those
      are handled by multi-word ``forbidden_signals`` (and
      rare ``forbidden_exceptions_media``), not by demoting
      bare ``skip*`` to cosignal. The only other non-Poor skip
      class is **setup-dependent** phrasing (``only skips on
      one turntable``, etc.), which is also in
      ``forbidden_signals``. Sleeve and media are graded
      independently via per-target ``hard_signals_*_sleeve`` /
      ``hard_signals_*_media`` lists so that playback wording
      (``skipping``) never cascades from a media defect onto
      the sleeve grade. Poor sleeve does not imply Poor media.
    # Media-only hard signals (playback / disc defects). ``skip`` /
    # ``skipping`` are strict per the Good-grade rubric: "plays
    # through" is the explicit Good baseline, so any skip — even a
    # single one — is below Good territory, i.e. Poor. Inconsistent
    # / setup-dependent skip phrasings are captured in
    # ``forbidden_signals`` (``depending on the turntable``) so they
    # still block the override without requiring corroboration.
    hard_signals_strict_media:
      - unplayable
      - cracked
      - badly warped
      - severely warped
      - won't play
      - will not play
      - does not play
      - skipping
      - skip
      - skips
      - skipped
      - skips throughout
      - deep gouges
      - groove damage
      - label peeling
      - heavily scratched
    # Cosignal: ambiguous catastrophic phrases that must corroborate
    # with another strict or cosignal signal in the same grade before
    # firing. ``heavy water damage`` etc. live here because the phrase
    # sometimes describes a sleeve-side water blob when the text is
    # applied to the media target. ``cannot play`` / ``unable to play``
    # are demoted because they occasionally describe speed-specific
    # or equipment-specific limitations rather than a disc defect.
    hard_signals_cosignal_media:
      - heavy water damage
      - severe water damage
      - major water damage
      - heavily water damaged
      - cannot play
      - unable to play
      - label missing
    # Sleeve-only hard signals (structural jacket damage)
    hard_signals_strict_sleeve:
      - completely split
      - fully split
      - falling apart
      - in pieces
      - disintegrated
      - split all the way
      - split along all seams
      - chunks of cardboard missing
      - seam is starting to separate
    hard_signals_cosignal_sleeve:
      - heavy water damage
      - severe water damage
      - major water damage
      - heavily water damaged
    supporting_signals: []
    forbidden_signals:
      # Negated playback issues — the word-boundary regex "skip" /
      # "skipping" still matches inside these phrases, so listing them
      # as forbiddens is the only way to prevent a negated mention
      # from firing Poor.
      - no skipping
      - without skipping
      - no skip
      - no skips
      - no jumps or skips
      - without skips
      - without any skips
      - don't skip
      - doesnt skip
      - doesn't skip
      - does not skip
      - do not skip
      - does not jump or skip
      - doesn't jump or skip
      - never skips
      - not skipping
      - not skipped
      - no jump / skip / repeat
      - minimal/no popping or skipping
      - no deep scratches or skipping
      - without jumping or skipping
      - no repeating clicks or skips
      - no warps or skips
      - no pops, clicks or skips
      - if there are any skips or repeats
      - might skip
      - skips may be possible
      - do not test 45s for any skips
      - does not test 45s for any skips
      # Inconsistent / setup-dependent playback — per user guidance,
      # the only legitimate reason a stated skip should NOT fire Poor
      # is when the seller tells us the skip is not reproducible on
      # a well-maintained turntable. Everything else (minor / one /
      # a few / two skips) is still Poor under the "plays through"
      # Good baseline.
      - depending on the turntable
      - depending on turntable
      - depending on the tonearm
      - skip on one turntable
      - skips on one turntable
      - only skips on
      - only skipped on
      # Softening qualifiers for cracked — a slightly cracked disc edge or hairline
      # stress crack is not catastrophic Poor.
      - slightly cracked
      - hairline crack
      - not cracked
      - no cracks
      - no crack
      # Any "slightly X" qualifier means the defect isn't catastrophic enough for Poor
      - slightly
      # Softeners for warped — slight warps don't reach catastrophic.
      - not warped
      - not badly warped
      - slight warp
      - minor warp
      - slightly warped
      - no warp
      # NOTE: positive-playback assertions ("plays fine", "plays great",
      # "plays perfectly", "plays well", "plays through") are intentionally
      # NOT Poor forbiddens per user guidance: even one skip is Poor
      # territory under the Good-grade "plays through" baseline. Genuinely
      # contradictory descriptions are handled by the ``contradictions``
      # list further down (which suppresses all overrides, letting the
      # model decide), not by blocking Poor specifically.
      # Negated split — "no splits", "not split" should not be Poor sleeve.
      - no splits
      - no split
      - not split
      # Packaging / seal context — "broken seal", "seal is broken", "not been broken"
      # describes the shrink-wrap, not the disc.
      - broken seal
      - seal broken
      - seal is broken
      - not been broken
      - has not been broken
      - never been broken
      # Parenthetical "(broken)" almost always describes an accessory (sticker, tab,
      # OBI flap), not the disc itself — disc breaks use "cracked" or "broken" plainly.
      - (broken)
    # Empty stubs flag the gap so Track B iterations fill them from
    # harmful / missed CSV exports.
    forbidden_exceptions_sleeve: []
    forbidden_exceptions_media: []
    min_supporting: 0
    rule_confidence_threshold: 1.0   # always overrides regardless of model confidence

  Generic:
    applies_to: [sleeve]             # never applies to media
    description: >
      Sleeve only. The record has no original cover — it is
      housed in a generic, plain, white, or die-cut sleeve,
      or a company/promo sleeve. Common for DJ copies, promos,
      and records where the original cover has been lost.
      Generic describes the sleeve type, not its condition.
      Rule engine owns this grade. As of §13b, hard signals
      are split into ``strict`` (unambiguous — any single
      match fires) and ``cosignal`` (ambiguous — requires
      corroboration from another strict or cosignal signal).
      The split targets false-positive drivers like bare
      ``white sleeve`` / ``black sleeve`` / ``plain sleeve`` /
      ``plain … jacket`` / ``plain cover`` / ``white label``,
      which are often grammatically ambiguous (inner vs outer
      housing). ``white label`` is cosignal-only so it does not
      fire alone—WL/promo listings often *do* use generic sleeves,
      so combine with another cue or a strict line. WL/promo
      listings are not excluded from Generic on that basis alone.
      Note: a Generic sleeve can still have a condition
      sub-note in the seller text (e.g. "generic sleeve, VG+")
      — in that case, Generic is the sleeve grade. The
      condition sub-note is preserved in seller notes only.
    # Strict: unambiguous "no original cover" wording — any one match fires.
    hard_signals_strict:
      - generic matte black sleeve
      - generic one-sheet sleeve
      - generic sleeve
      - generic cover
      - generic jacket
      - no original cover
      - no original sleeve
      - no original jacket
      - no cover
      - no jacket
      - without cover
      - missing cover
      - jacket missing
      - blank sleeve
      - company sleeve
      - replacement sleeve
      - replacement cover
      - stock sleeve
    # Cosignal: ambiguous phrases that must corroborate with another strict /
    # cosignal signal. ``white sleeve`` / ``black sleeve`` often refer to a
    # *inner* or *company* paper sleeve paired with an original jacket;
    # ``plain sleeve`` / ``plain cover`` / ``plain … jacket`` likewise.
    # ``white label`` is cosignal-only so it never fires Generic alone; WL
    # promos often ship in generic/plain housings, so we do **not** forbid
    # ``white label promo``. Pair with another cue when the listing also
    # mentions an original jacket, or use strict lines. ``promo sleeve``
    # / ``promotional sleeve`` / ``inner sleeve
    # only`` are demoted per plan §11 because promos can ship with original
    # art and "inner sleeve only" is sometimes a condition sub-note on the
    # inner paper rather than a housing statement. They only indicate Generic
    # when another cue is present.
    hard_signals_cosignal:
      - black sleeve
      - white sleeve
      - plain black jacket
      - plain cover
      - plain sleeve
      - plain white
      - plain white jacket
      - white label
      - die-cut sleeve
      - die cut sleeve
      - promo sleeve
      - promotional sleeve
      - inner sleeve only
      - cardboard sleeve
      - paper sleeve
    supporting_signals: []
    # Negations / mentions of an original cover — block Generic override when
    # seller explicitly says the jacket is present. Word-boundary regex means
    # "original cover" matches both "has original cover" and "original cover
    # is worn". Pair with forbidden_exceptions_sleeve for negated forms like
    # "no original cover" (which, confusingly, indicates Generic rather than
    # an original cover).
    forbidden_signals:
      - original cover
      - original sleeve
      - original jacket
      - original artwork
      - picture sleeve
      - outer sleeve
      - inner sleeve included
      - with sleeve
      - with original
      - obi
      - gatefold
      - with cover
      - with original cover
      - has cover
    # Negated "original cover" phrases are strict Generic hints — strip them
    # before the forbidden check so ``no original cover`` doesn't match
    # ``original cover`` and block the Generic override. Also seed benign
    # phrases that mention original cover but indicate a Generic-like housing
    # (e.g. promo copies bundled with a real cover as a bonus).
    forbidden_exceptions_sleeve:
      - no original cover
      - no original sleeve
      - no original jacket
      - without original cover
      - without original sleeve
      - missing original cover
      - promo sleeve with cover
      - promo copy with sleeve
      - inner sleeve only minor wear
      - inner sleeve only light wear
    min_supporting: 0
    rule_confidence_threshold: 1.0   # always overrides regardless of model confidence

# ------------------------------------------------------------
# Discogs Marketplace Condition String Mapping
# ------------------------------------------------------------
# Maps raw Discogs API condition strings to canonical grades.
# Used in ingest_discogs.py — do not modify without updating
# ingestion logic.
# Discogs inventory uses "Generic" for the sleeve-only case.
# Some older sources also use "Generic Sleeve".
# ------------------------------------------------------------
discogs_condition_map:
  "Mint (M)":                  Mint
  "Near Mint (NM or M-)":      Near Mint
  "Very Good Plus (VG+)":      Very Good Plus
  "Very Good (VG)":            Very Good
  "Good Plus (G+)":            Good
  "Good (G)":                  Good
  "Fair (F)":                  Poor
  "Poor (P)":                  Poor
  "Generic Sleeve":            Generic   # sleeve only
  "Generic":                   Generic   # sleeve only (inventory API)

# ------------------------------------------------------------
# Contradiction Detection
# ------------------------------------------------------------
# When contradictory signals appear in the same description,
# rule overrides are suppressed and model prediction is
# returned with contradiction_detected: true in metadata.
# Checked independently for sleeve and media.
# Generic contradictions are not checked — Generic is
# always deterministic when a hard signal is present.
# ------------------------------------------------------------
# NOTE: Contradictions use plain substring matching (see
# ``RuleEngine.detect_contradictions``) and have no negation-aware window.
# Pairs that chronically fire on disclaimed defects ("near mint with NO
# surface noise", "excellent condition - no foggy spots") were removed in
# §14 — that suppression is delegated to per-grade ``forbidden_signals`` +
# ``forbidden_exceptions_sleeve/_media``, which do strip negated phrases
# before matching. Keep only pairs where both sides are *assertions* (not
# commonly negated) and co-occurrence genuinely contradicts the grade.
contradictions:
  - [sealed, surface noise]
  - [sealed, scratches]
  - [sealed, scratch]
  # Sealed copies cannot be meaningfully defect-graded on playback
  # — added in the contradictions-expansion pass to suppress spurious
  # Poor overrides when the seller describes sealed inventory with a
  # boilerplate "may be cracked / warped" disclaimer.
  - [sealed, cracked]
  - [sealed, skipping]
  - [factory sealed, cracked]
  - [mint, surface noise]
  - [mint, scratches]
  - [never played, surface noise]
  - [never played, crackling]
  - [never played, cracked]
  - [unplayed, surface noise]
  - [unplayed, cracked]
  - [plays perfectly, skipping]
  - [plays perfectly, surface noise]
  - [plays perfectly, persistent]
  - [plays perfectly, crackling]
  - [plays perfectly, cracked]
  - [plays perfectly, unplayable]
  - [plays great, crackling]
  - [plays great, skipping]
  - [plays fine, cracked]
  - [plays fine, skipping]
  - [no marks, scratches]
  - [no defects, surface noise]
