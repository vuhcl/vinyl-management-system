# ============================================================
# grader/configs/grader.yaml
#
# Grader module configuration.
# Inherits shared project config from configs/base.yaml.
#
# Grade schema, rule engine signals, and eBay JP harmonization
# live in grader/configs/grading_guidelines.yaml.
# Do not duplicate label or rule definitions here.
#
# All secrets (API tokens) are read from environment variables.
# Never hardcode credentials in this file.
# ============================================================

inherits: configs/base.yaml

# ------------------------------------------------------------
# Guidelines Reference
# ------------------------------------------------------------
# Single source of truth for grade schema, rule engine signals,
# eBay JP harmonization, and contradiction detection.
# All modules must load this file — never hardcode grade lists.
# ------------------------------------------------------------
guidelines_path: grader/configs/grading_guidelines.yaml

# ------------------------------------------------------------
# Paths
# ------------------------------------------------------------
paths:
  raw:          grader/data/raw/
  processed:    grader/data/processed/
  splits:       grader/data/splits/
  artifacts:    grader/artifacts/
  reports:      grader/reports/

# ------------------------------------------------------------
# Discogs API
# ------------------------------------------------------------
discogs:
  base_url:               https://api.discogs.com
  token:                  ${DISCOGS_TOKEN}       # environment variable
  rate_limit_per_minute:  60
  # Ingestion uses GET /users/{username}/inventory — not /marketplace/search (404).

# ------------------------------------------------------------
# eBay API
# ------------------------------------------------------------
ebay:
  base_url:               https://api.ebay.com/buy/browse/v1
  token_url:              https://api.ebay.com/identity/v1/oauth2/token
  client_id:              ${EBAY_CLIENT_ID}      # environment variable
  client_secret:          ${EBAY_CLIENT_SECRET}  # environment variable
  rate_limit_per_minute:  45                     # conservative — eBay Browse API

# ------------------------------------------------------------
# Data Ingestion
# ------------------------------------------------------------
data:
  harmonization:
    min_samples_per_class: 500      # warn if any class falls below this
    output_path: grader/data/processed/unified.jsonl
    report_path: grader/reports/class_distribution.txt
    # Drop description-thin rows using the same rules as preprocess
    # (preprocessing.description_adequacy). Requires adequacy.enabled: true.
    exclude_thin_notes: false

  sources:
    - discogs
    - ebay_jp

  # Sale-history SQLite → discogs_sale_history.jsonl (see ingest_sale_history.py).
  sale_history:
    sqlite_path: price_estimator/data/cache/sale_history.sqlite
    processed_jsonl: grader/data/processed/discogs_sale_history.jsonl
    # Optional SQLite prefetch before parse (biased prefix unless full table).
    # sql_sample_order applies only when sql_prefetch_limit > 0: ordered (default)
    # or random (ORDER BY RANDOM() — costly on huge DBs).
    sql_prefetch_limit: null
    sql_sample_order: ordered
    # After parse + enrich: cap rows per (sleeve_label, media_label), then optional
    # per sleeve_label, then optional global cap.
    max_rows_per_joint_grade: 4000
    joint_sample_seed: 42
    # Cap rows per sleeve_label (aggregated over media); runs after joint cap.
    max_rows_per_sleeve_grade: 25000
    # Omit or null to use joint_sample_seed + 100003 for the sleeve-stratum shuffle.
    sleeve_stratum_sample_seed: null
    # When the sleeve cap fires: if true, split that sleeve's row budget across
    # media_label values as evenly as counts allow (then shuffle within each).
    # If false (default), one shuffle over all rows for that sleeve (dominant
    # (sleeve, media) pairs can take most of the cap).
    balance_joint_within_sleeve_trim: true
    max_total_sale_history_rows: 200000
    # Join release_id → price_estimator feature store (format_desc / formats_json).
    feature_store_path: price_estimator/data/feature_store.sqlite
    enrich_from_feature_store: true
    enrich_missing_from_discogs: false
    # keep: unknown format (no FS row / empty) passes through; drop: remove those rows.
    on_missing_release: keep
    apply_vinyl_filter: true
    # When ``vinyl_format_filter_stage: post_patch``, re-filter the sale JSONL on
    # disk; set false if you always run ``ingest_sale_history`` in the same session
    # (e.g. ``pipeline train`` with sale history on disk) to avoid redundant I/O.
    run_sale_vinyl_in_post_hook: true

  # Optional JSONL of {item_id, source, …} merges after ingest (see label_patches.py).
  # Uncomment and create the file to persist manual relabels across re-ingestion.
  # label_patches_path: grader/data/label_patches.jsonl

  discogs:
    format_filter:      Vinyl    # default when omitted: Vinyl (see ingest_discogs.DEFAULT_DISCOGS_FORMAT_FILTER)
    # Where client-side vinyl matching runs (see vinyl_format.py + pipeline.train):
    #   fetch      — during inventory fetch (default); non-vinyl rows never enter buckets.
    #   post_patch — keep all formats at fetch; after label patches, drop non-vinyl
    #                Discogs rows using saved release_format / release_description.
    vinyl_format_filter_stage: post_patch
    # Discogs forbids page > 100 on *other users'* inventories (403). Own shop
    # via OAuth can go deeper; personal token alone still hits this cap.
    max_public_inventory_pages: 100
    # Matches seller profile UI (e.g. …/profile?limit=250&format=Vinyl). We send
    # per_page + limit on api.discogs.com; the API may still cap at 100 — see logs.
    inventory_per_page:   250
    inventory_send_limit_param: true
    inventory_sort:       listed   # API field; website uses sort=listed,desc
    inventory_sort_order: desc
    # Send format=Vinyl (etc.) on inventory GET — not in official docs; if 400, we retry without.
    inventory_format_api_param: true
    target_per_grade:   20000        # max listings to fetch per canonical grade
                                   # grades: Mint, Near Mint, VG+, VG, Good, Poor
                                   # Excellent excluded — Discogs has no EX grade
                                   # Generic excluded — not a searchable condition
    # Drop seller notes that look like shop boilerplate only (see ingest_discogs).
    generic_note_filter:
      enabled: true
      # Remove boilerplate sentences/lines from saved ``text`` (same patterns as drop).
      strip_boilerplate: true
      # Strip http(s) / ``www.`` and emoji/dingbats before pattern matching (see
      # ``grader/src/data/ingest_discogs.py``: ``normalize_seller_comment_text``,
      # ``_DEFAULT_GENERIC_NOTE_PATTERNS``). Set false to ablate without forking code.
      strip_urls: true
      strip_emoji: true
      # If any pattern matches (case-insensitive) and the note lacks item-specific
      # hints, the row is dropped — unless sleeve/media is Mint or preservation
      # keywords (sealed, shrink, …) appear in the comment.
      # patterns:  # defaults in ingest_discogs._DEFAULT_GENERIC_NOTE_PATTERNS include
      #   promo banners ("half off", "marked for deletion", "new low price"),
      #   trust spam ("reputable seller", "buy with confidence", refund lines),
      #   and provenance tails like "collection]" for bracketed seller lines.
      #   - "my custom boilerplate phrase"
      # item_specific_hints:  # substrings that mean “this copy” was described
      #   - "hairline"
      # preservation_keywords:
      #   - "sealed"

    # Public seller inventories (add/remove usernames). Large vinyl shops work best.
    inventory_sellers:
      - Redscroll
      - 1234gorecords
      - All-Day
      - Art-is-an
      - DeeperThanTheDeepest
      - hogwildrecords
      - philadelphiamusic
      - GroovesVinyl
      - MION.USA
      - bulltrax
      - bordentownrecords
      # Add more usernames (exactly as on discogs.com/user/...); 404 sellers are skipped.

  ebay:
    min_text_length:    3          # lower than Discogs — JP seller notes are sparse
    trusted_sellers:
      facerecords:
        sleeve_field:   "Sleeve Grading"
        media_field:    "Record Grading"
        obi_field:      "OBI_Grading"
        grade_format:   clean      # bare grade value e.g. "VG+", "E-"
      ellarecords2005:
        sleeve_field:   "Cover Condition"
        media_field:    "Vinyl Condition"
        obi_field:      "OBI Condition"
        grade_format:   annotated  # grade + inline defect codes
                                   # e.g. "E (Excellent) S (Stain) cornerbump"

  # Train/val/test split ratios — must sum to 1.0
  # Stratified by sleeve_label and media_label jointly
  splits:
    train:        0.7
    val:          0.15
    test:         0.15
    stratify_by:  [sleeve_label, media_label]
    random_seed:  42               # overrides base.yaml seed for reproducibility

# ------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------
preprocessing:
  lowercase:              true
  normalize_whitespace:   true
  # When true, applies _strip_leading_numeric_boilerplate in clean_text and in
  # TF-IDF extract_texts (catalog index digit before condition words). When
  # false, that step is skipped.
  strip_stray_numeric_tokens: true

  # Case-insensitive substring removals (longest-first at runtime). Applied
  # after structural markdown/bracket/US-shipping-regex passes in clean_text.
  promo_noise_patterns:
    - "all items sent securely in a double padded mailer with the vinyl separated from the sleeve (unless sealed)"
    - "**all $1 & $2 items = buy 2 get 1 free !! note: price deduction will be made on the least priced items in the order post-invoice so please refrain from making payment until final subtotal is adjusted**"
    - "/all sealed items are sold \"one way / as is\" and cannot be returned or exchanged"
    - "all sealed items are sold \"one way / as is\" and cannot be returned or exchanged"
    - "if not completely satisfied send back for a full refund at our expense"
    - "all the products that we sell are 100% guaranteed"
    - "we have a warehouse full of new cd's, cassettes, lp's, 45's, 12'' singles"
    - "that are 35 plus years old"
    - "everything has been marked down 75% for another 24 hours ship up to 20 records in usa for only $5!! all orders over $25 cleaned on vpi!"
    - "summer sale! all vinyl marked down 20%+ unlimited $5--"
    - "summer sale 10% off storewide 1 week only!"
    - "packed safely, shipped promptly! lp's are shipped in custom boxes for reinforced protection"
    - "customs friendly"
    - "part of my personal collection"
    - "warehouse back stock"
    - "always shipped with domestic tracking"
    - "full refund"
    - "post x4 records for the same price as shipping one record"
    - "100 000+ items in our shop in upminster essex (district line / m25)"
    - "- 1000's more records & cds at our shop in upminster essex"
    - "100 000+ items in our shop"
    - "you can collect in store we buy records!"
    - "cleaned in a degritter - the best ultrasonic record cleaning"
    - "disc stored in anti static inner"
    - "ultrasonic cleaned"
    - "vpi vacuumed"
    - "shipped in sturdy whiplash mailer"
    - "whiplash mailer"
    - "international buyers message me for your shipping quote"
    - "qualify for free shipping"
    - "less than half of our inventory is posted here!"
    - "we're a real record store near pittsburgh pa"
    - "read seller terms!"
    - "cds ship in cardboard!"
    - "$9 flat shipping!"
    - "scoop purchase limited time buy 6x12\" singles get 6x12\" singles free ( cheapest free )"
    - "buy this copy today"
    - "uk post only"
    - "uk mainland customers 1-7 lp/12\" or 30 7\" singles same p&p combine & save*"
    - "* -accurate grading or refund*"
    - "*buy 5 get cheapest free*"
    - "jacksonville pressing"
    - "all fair offers accepted"
    - "⭐"
    - "$5 unlimited shipping in usa"
    - "postal charges reflect quality care and services used"
    - "we're marrs plectrum records official rsd real world indie shop in peterborough uk"
    - "we’re marrs plectrum records official rsd real world indie shop in peterborough uk"
    - "all orders in uk sent first class"
    - "europe/worldwide with tracking"
    - "we only use quality mailers"
    - "ship throughout the week"
    - "we do this professionally"
    - "recorded delivery"
    - "pics available upon request"
    - "cheapest price"
    - "accepting paypal credit"
    - "pay in 3"
    - "watch my cleaning process here"
    - "orders over $60 ship for $6"
    - "free shipping on usa orders over $30"
    - "flatrate shipping rates to all 6 continents"
    - "from our us-hub"
    - "check my other black sabbath records and combine shipping !!!"
    - "buy 12 records and get the cheapest for free"
    - "you will receive 2 free records in the same style"
    - "free shipping: above 145 euro in europe (eu)"
    - "check out our big stock of house techno trance disco & more"
    - "pick up in barcelona possible"
    - "cheap worldwide shipping price"
    - "regular 1-5lp is the same shipping cost (2lp count as 2) gatefold sleeves is as well"
    - "*was £295 27th jun '25 reduced 8th jun '25 £282 7th aug '25 £275 22nd aug '25 £269 5th sep '25 reduced 10th oct '25*"
    - "superlow shipping prices to the europe and the us"
    - "label variation"
    - "orders usually processed within 24-48 hours"
    - "in business since 1979"

  # Abbreviation expansion — applied before any feature extraction.
  # Order matters: longest/most specific patterns first to avoid
  # partial matches (e.g. "vg++" must come before "vg+").
  # Protected terms (grading_guidelines.yaml) must survive cleaning; promo
  # stripping avoids blanket ``**…**`` removal (sellers bold real defects).
  abbreviation_map:
    "m-":     "mint minus"
    "nm":     "near mint"
    "n.m.":   "near mint"
    "vg++":   "very good plus"
    "vg+":    "very good plus"
    "vg":     "very good"
    "g+":     "good plus"
    "ex+":    "excellent plus"
    "ex-":    "excellent minus"
    "ex":     "excellent"
    "e+":     "excellent plus"
    "e-":     "excellent minus"
    "ois":    "original inner sleeve"
    "opis":   "original printed inner sleeve"
    "woc":    "writing on cover"
    "wobc":   "writing on back cover"
    "wol":    "writing on label"
    "soc":    "sticker on cover"
    "sol":    "sticker on label"
    "dnap":   "does not affect play"

  # Minimum text length after cleaning — listings below this are dropped.
  # Discogs: 10 chars (seller notes expected to be descriptive)
  # eBay JP: handled per-source in ingest_ebay.py (min 3 chars)
  min_text_length_discogs:  10

  # Flag thin seller notes (missing sleeve and/or playable-media cues).
  # Rows that fail require_both_for_training are still written to
  # preprocessed.jsonl but excluded from train/val/test splits when
  # drop_insufficient_from_training is true.
  description_adequacy:
    enabled:                        true
    drop_insufficient_from_training: true
    require_both_for_training:      true
    # When sleeve_label is Mint, treat short sealed / Mint-ish copy as sleeve-adequate
    # (see preprocess.compute_description_quality). Legacy key
    # mint_both_labels_relax_sleeve_note is still read if this key is omitted.
    mint_sleeve_label_relax_sleeve_note: true
    # Optional extra substrings (lowercased) for Mint-sleeve relaxation only.
    # mint_sleeve_note_relax_extra_terms: []
    # If the note is at least this long (cleaned text) and has no sleeve
    # keywords, still count sleeve as adequate (avoids dropping long notes).
    min_chars_sleeve_fallback:      56
    user_prompt_sleeve: >-
      Add jacket/sleeve detail (corners, ring wear, seams, inserts, shrink).
    user_prompt_media: >-
      Describe playable condition (surface marks, noise, how it plays) or say sealed/unplayed.
    sleeve_evidence_terms:
      - jacket
      - sleeve
      - cover
      - outer sleeve
      - gatefold
      - obi
      - insert
      - spine
      - back cover
      - front cover
      - corner
      - corners
      - ringwear
      - ring wear
      - seam
      - split
      - crease
      - creased
      - stain
      - wear on
      - shrink
      - hype sticker
      - picture sleeve
      - laminated

# ------------------------------------------------------------
# Rule Engine
# ------------------------------------------------------------
# Rule logic and all signal lists live in grading_guidelines.yaml.
# This section controls runtime behavior only.
# ------------------------------------------------------------
rules:
  guidelines_path:        grader/configs/grading_guidelines.yaml
  confidence_threshold:   0.85     # global fallback if not set per grade
  # When false (default): (1) soft overrides never assign Excellent; (2) any
  # model-predicted Excellent is remapped to Near Mint after rules (Discogs
  # schema treats EX as unused — collector NM for near-perfect copies).
  allow_excellent_soft_override: false
  flag_contradictions:    true
  contradiction_action:   return_model_prediction   # suppress override on contradiction

# ------------------------------------------------------------
# Models
# ------------------------------------------------------------
models:
  baseline:
    name:   tfidf_logreg
    tfidf:
      max_features:   10000
      ngram_range:    [1, 2]
      sublinear_tf:   true
      min_df:         2
    logistic_regression:
      C:              1.0
      # LBFGS + multinomial is often faster wall-clock here than SAGA on
      # very large sparse TF-IDF (SAGA may need many epochs and still warn).
      # If ConvergenceWarning persists, raise max_iter before loosening tol.
      max_iter:       15000
      # Slightly looser than sklearn default 1e-4 speeds LBFGS a bit on
      # ill-conditioned sparse problems; tighten back to 1e-4 if you need
      # stricter optimality.
      tol:            5.0e-4
      class_weight:   balanced     # handles class imbalance
      solver:         lbfgs
      random_state:   42
    tuning:
      enabled:        true
      c_values:       [0.3, 1.0, 3.0, 10.0]
    engineered_features:
      enabled:        true
    boundary_objective:
      enabled:        true
      alpha:          0.20
    confidence_band:
      enabled:        true
      max_gap:        0.12
    media_evidence_gating:
      enabled:        false
      alpha_none:     0.10
      alpha_weak:     0.05
    media_evidence_aux:
      enabled:        true

  transformer:
    name:                   distilbert_two_head
    base_model:             distilbert-base-uncased
    freeze_encoder:         true   # default for small dataset (~1K-5K samples)
                                   # set to false to ablate full fine-tuning
    # When freeze_encoder is true: unfreeze last N DistilBERT transformer blocks
    # (0 = heads-only). Ignored when freeze_encoder is false.
    unfreeze_top_n_layers:  2
    max_length:             128
    dropout:                0.35
    learning_rate:          1.5e-4
    batch_size:             24
    epochs:                 40
    early_stopping_patience: 6
    class_weight:           balanced
    random_state:           42
    weight_decay:           0.04    # AdamW L2; raise to reduce overfit
    warmup_ratio:           0.1     # linear LR warmup fraction of total steps
    # Auxiliary 3-way head: none / weak / strong (heuristic media evidence)
    media_evidence_aux:
      enabled:              true
      loss_weight:          0.2

# ------------------------------------------------------------
# Evaluation
# ------------------------------------------------------------
evaluation:
  primary_metric:   macro_f1
  metrics:
    - macro_f1
    - accuracy
    - calibration_error
  calibration:
    method:     isotonic           # isotonic regression post-hoc calibration
    cv_folds:   5
  # Discogs-only data often has no Excellent in train/test; rules may still
  # assign Excellent. If true, rule-adjusted macro-F1/accuracy (and grade
  # analysis scoring lines) use the model-only label on rows where the
  # rule-adjusted prediction is Excellent. Override audit still uses raw
  # before/after.
  excellent_eval_use_model_prediction: true
  # Optional: which splits get rule-engine eval in pipeline step 9 (default:
  # test + test_thin). Uncomment the next two lines for fast Track B
  # iteration when test_thin is huge (writes a smaller rule_engine_baseline.json).
  # rule_eval_splits:
  #   - test

# ------------------------------------------------------------
# MLflow
# ------------------------------------------------------------
# Primary URI: set MLFLOW_TRACKING_URI (e.g. http://GCP_HOST:5000).
# If unset, tracking_uri_fallback is used (local SQLite metadata DB).
# Production: point the MLflow server at gs://… for --default-artifact-root and use
# GOOGLE_APPLICATION_CREDENTIALS (or ADC) on training and serving so artifacts use GCS.
# Retention (GCS lifecycle, mlflow gc, registry prune): optional ops bundle at
# scripts/mlflow_retention/ (not tracked; keep a local copy if you use it).
#
# Cost control (same idea as price_estimator train_vinyliq):
#   enabled: false        — no MLflow runs at all; models still written to paths.artifacts
#   log_artifacts: false  — runs still log params/metrics/tags; no log_artifact / pyfunc /
#                          registry (registry needs a run artifact).
# CLI: python -m grader.src.pipeline train --no-mlflow | --mlflow-no-artifacts
mlflow:
  enabled: true
  log_artifacts: true
  # When false (default), ingest / harmonize / preprocess / TF-IDF (and eBay
  # ingest) do not open nested MLflow runs — keeps the server focused on
  # model training. Set true for per-step ETL metrics while debugging.
  log_pipeline_step_runs: false
  # transformer_tune: many sweep runs go here (local SQLite by default).
  # Remote production tracking stays on tracking_uri_fallback / MLFLOW_TRACKING_URI.
  tuning_tracking_uri_fallback: sqlite:///grader/experiments/mlflow_tuning.db
  tuning_experiment_name: vinyl_grader_tune
  experiment_name:    vinyl_grader
  # Register transformer pyfunc after full pipeline train (models:/name/...)
  registry_model_name: VinylGrader
  register_after_pipeline: true
  tracking_uri_fallback: sqlite:///grader/experiments/mlflow.db
  tags:
    project:  vinyl_collector_ai
    module:   grader

# ------------------------------------------------------------
# Inference
# ------------------------------------------------------------
inference:
  model: transformer


# ------------------------------------------------------------
# Export
# ------------------------------------------------------------
# Paths for serialized model artifacts.
# All artifacts must be saved here for reproducibility —
# never save models to ad-hoc locations.
# ------------------------------------------------------------
export:
  onnx_path:                  grader/artifacts/model.onnx
  coreml_path:                grader/artifacts/VinylGrader.mlpackage
  preprocessing_pipeline_path: grader/artifacts/preprocessor.pkl
  label_encoder_path:         grader/artifacts/label_encoder.pkl
  tfidf_vectorizer_path:      grader/artifacts/tfidf_vectorizer.pkl
