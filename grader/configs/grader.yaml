# ============================================================
# grader/configs/grader.yaml
#
# Grader module configuration.
# Inherits shared project config from configs/base.yaml.
#
# Grade schema, rule engine signals, and eBay JP harmonization
# live in grader/configs/grading_guidelines.yaml.
# Do not duplicate label or rule definitions here.
#
# All secrets (API tokens) are read from environment variables.
# Never hardcode credentials in this file.
# ============================================================

inherits: configs/base.yaml

# ------------------------------------------------------------
# Guidelines Reference
# ------------------------------------------------------------
# Single source of truth for grade schema, rule engine signals,
# eBay JP harmonization, and contradiction detection.
# All modules must load this file — never hardcode grade lists.
# ------------------------------------------------------------
guidelines_path: grader/configs/grading_guidelines.yaml

# ------------------------------------------------------------
# Paths
# ------------------------------------------------------------
paths:
  raw:          grader/data/raw/
  processed:    grader/data/processed/
  splits:       grader/data/splits/
  artifacts:    grader/artifacts/
  reports:      grader/reports/

# ------------------------------------------------------------
# Discogs API
# ------------------------------------------------------------
discogs:
  base_url:               https://api.discogs.com
  token:                  ${DISCOGS_TOKEN}       # environment variable
  rate_limit_per_minute:  60
  # Ingestion uses GET /users/{username}/inventory — not /marketplace/search (404).

# ------------------------------------------------------------
# eBay API
# ------------------------------------------------------------
ebay:
  base_url:               https://api.ebay.com/buy/browse/v1
  token_url:              https://api.ebay.com/identity/v1/oauth2/token
  client_id:              ${EBAY_CLIENT_ID}      # environment variable
  client_secret:          ${EBAY_CLIENT_SECRET}  # environment variable
  rate_limit_per_minute:  45                     # conservative — eBay Browse API

# ------------------------------------------------------------
# Data Ingestion
# ------------------------------------------------------------
data:
  harmonization:
    min_samples_per_class: 50      # warn if any class falls below this
    output_path: grader/data/processed/unified.jsonl
    report_path: grader/reports/class_distribution.txt
    # Drop description-thin rows using the same rules as preprocess
    # (preprocessing.description_adequacy). Requires adequacy.enabled: true.
    exclude_thin_notes: false

  sources:
    - discogs
    - ebay_jp

  discogs:
    format_filter:      Vinyl    # default when omitted: Vinyl (see ingest_discogs.DEFAULT_DISCOGS_FORMAT_FILTER)
    # Discogs forbids page > 100 on *other users'* inventories (403). Own shop
    # via OAuth can go deeper; personal token alone still hits this cap.
    max_public_inventory_pages: 100
    # Matches seller profile UI (e.g. …/profile?limit=250&format=Vinyl). We send
    # per_page + limit on api.discogs.com; the API may still cap at 100 — see logs.
    inventory_per_page:   250
    inventory_send_limit_param: true
    inventory_sort:       listed   # API field; website uses sort=listed,desc
    inventory_sort_order: desc
    # Send format=Vinyl (etc.) on inventory GET — not in official docs; if 400, we retry without.
    inventory_format_api_param: true
    target_per_grade:   10000        # max listings to fetch per canonical grade
                                   # grades: Mint, Near Mint, VG+, VG, Good, Poor
                                   # Excellent excluded — Discogs has no EX grade
                                   # Generic excluded — not a searchable condition
    # Drop seller notes that look like shop boilerplate only (see ingest_discogs).
    generic_note_filter:
      enabled: true
      # Remove boilerplate sentences/lines from saved ``text`` (same patterns as drop).
      strip_boilerplate: true
      # If any pattern matches (case-insensitive) and the note lacks item-specific
      # hints, the row is dropped — unless sleeve/media is Mint or preservation
      # keywords (sealed, shrink, …) appear in the comment.
      # patterns:  # defaults in ingest_discogs._DEFAULT_GENERIC_NOTE_PATTERNS include
      #   promo banners ("half off", "marked for deletion", "new low price"),
      #   trust spam ("reputable seller", "buy with confidence", refund lines),
      #   and provenance tails like "collection]" for bracketed seller lines.
      #   - "my custom boilerplate phrase"
      # item_specific_hints:  # substrings that mean “this copy” was described
      #   - "hairline"
      # preservation_keywords:
      #   - "sealed"

    # Public seller inventories (add/remove usernames). Large vinyl shops work best.
    inventory_sellers:
      - Redscroll
      - 1234gorecords
      - All-Day
      - Art-is-an
      - DeeperThanTheDeepest
      - hogwildrecords
      - philadelphiamusic
      - GroovesVinyl
      - MION.USA
      - bulltrax
      - bordentownrecords
      # Add more usernames (exactly as on discogs.com/user/...); 404 sellers are skipped.

  ebay:
    min_text_length:    3          # lower than Discogs — JP seller notes are sparse
    trusted_sellers:
      facerecords:
        sleeve_field:   "Sleeve Grading"
        media_field:    "Record Grading"
        obi_field:      "OBI_Grading"
        grade_format:   clean      # bare grade value e.g. "VG+", "E-"
      ellarecords2005:
        sleeve_field:   "Cover Condition"
        media_field:    "Vinyl Condition"
        obi_field:      "OBI Condition"
        grade_format:   annotated  # grade + inline defect codes
                                   # e.g. "E (Excellent) S (Stain) cornerbump"

  # Train/val/test split ratios — must sum to 1.0
  # Stratified by sleeve_label and media_label jointly
  splits:
    train:        0.70
    val:          0.15
    test:         0.15
    stratify_by:  [sleeve_label, media_label]
    random_seed:  42               # overrides base.yaml seed for reproducibility

# ------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------
preprocessing:
  lowercase:              true
  normalize_whitespace:   true

  # Abbreviation expansion — applied before any feature extraction.
  # Order matters: longest/most specific patterns first to avoid
  # partial matches (e.g. "vg++" must come before "vg+").
  # Protected terms (see grading_guidelines.yaml) are never stripped.
  abbreviation_map:
    "m-":     "mint minus"
    "nm":     "near mint"
    "n.m.":   "near mint"
    "vg++":   "very good plus"
    "vg+":    "very good plus"
    "vg":     "very good"
    "g+":     "good plus"
    "ex+":    "excellent plus"
    "ex-":    "excellent minus"
    "ex":     "excellent"
    "e+":     "excellent plus"
    "e-":     "excellent minus"
    "woc":    "writing on cover"
    "wobc":   "writing on back cover"
    "wol":    "writing on label"
    "soc":    "sticker on cover"
    "sol":    "sticker on label"

  # Minimum text length after cleaning — listings below this are dropped.
  # Discogs: 10 chars (seller notes expected to be descriptive)
  # eBay JP: handled per-source in ingest_ebay.py (min 3 chars)
  min_text_length_discogs:  10

  # Flag thin seller notes (missing sleeve and/or playable-media cues).
  # Rows that fail require_both_for_training are still written to
  # preprocessed.jsonl but excluded from train/val/test splits when
  # drop_insufficient_from_training is true.
  description_adequacy:
    enabled:                        true
    drop_insufficient_from_training: true
    require_both_for_training:      true
    # If the note is at least this long (cleaned text) and has no sleeve
    # keywords, still count sleeve as adequate (avoids dropping long notes).
    min_chars_sleeve_fallback:      56
    user_prompt_sleeve: >-
      Add jacket/sleeve detail (corners, ring wear, seams, inserts, shrink).
    user_prompt_media: >-
      Describe playable condition (surface marks, noise, how it plays) or say sealed/unplayed.
    sleeve_evidence_terms:
      - jacket
      - sleeve
      - cover
      - outer sleeve
      - gatefold
      - obi
      - insert
      - spine
      - back cover
      - front cover
      - corner
      - corners
      - ringwear
      - ring wear
      - seam
      - split
      - crease
      - creased
      - stain
      - wear on
      - shrink
      - hype sticker
      - picture sleeve
      - laminated

# ------------------------------------------------------------
# Rule Engine
# ------------------------------------------------------------
# Rule logic and all signal lists live in grading_guidelines.yaml.
# This section controls runtime behavior only.
# ------------------------------------------------------------
rules:
  guidelines_path:        grader/configs/grading_guidelines.yaml
  confidence_threshold:   0.85     # global fallback if not set per grade
  flag_contradictions:    true
  contradiction_action:   return_model_prediction   # suppress override on contradiction

# ------------------------------------------------------------
# Models
# ------------------------------------------------------------
models:
  baseline:
    name:   tfidf_logreg
    tfidf:
      max_features:   10000
      ngram_range:    [1, 2]
      sublinear_tf:   true
      min_df:         2
    logistic_regression:
      C:              1.0
      max_iter:       1000
      class_weight:   balanced     # handles class imbalance
      solver:         lbfgs
      random_state:   42
    tuning:
      enabled:        true
      c_values:       [0.3, 1.0, 3.0, 10.0]
    engineered_features:
      enabled:        true
    boundary_objective:
      enabled:        true
      alpha:          0.20
    confidence_band:
      enabled:        true
      max_gap:        0.12
    media_evidence_gating:
      enabled:        false
      alpha_none:     0.10
      alpha_weak:     0.05
    media_evidence_aux:
      enabled:        true

  transformer:
    name:                   distilbert_two_head
    base_model:             distilbert-base-uncased
    freeze_encoder:         true   # default for small dataset (~1K-5K samples)
                                   # set to false to ablate full fine-tuning
    # When freeze_encoder is true: unfreeze last N DistilBERT transformer blocks
    # (0 = heads-only). Ignored when freeze_encoder is false.
    unfreeze_top_n_layers:  2
    max_length:             128
    dropout:                0.35
    learning_rate:          1.5e-4
    batch_size:             24
    epochs:                 40
    early_stopping_patience: 6
    class_weight:           balanced
    random_state:           42
    weight_decay:           0.04    # AdamW L2; raise to reduce overfit
    warmup_ratio:           0.1     # linear LR warmup fraction of total steps
    # Auxiliary 3-way head: none / weak / strong (heuristic media evidence)
    media_evidence_aux:
      enabled:              true
      loss_weight:          0.2

# ------------------------------------------------------------
# Evaluation
# ------------------------------------------------------------
evaluation:
  primary_metric:   macro_f1
  metrics:
    - macro_f1
    - accuracy
    - calibration_error
  calibration:
    method:     isotonic           # isotonic regression post-hoc calibration
    cv_folds:   5
  # Discogs-only data often has no Excellent in train/test; rules may still
  # assign Excellent. If true, rule-adjusted macro-F1/accuracy (and grade
  # analysis scoring lines) use the model-only label on rows where the
  # rule-adjusted prediction is Excellent. Override audit still uses raw
  # before/after.
  excellent_eval_use_model_prediction: true

# ------------------------------------------------------------
# MLflow
# ------------------------------------------------------------
# Primary URI: set MLFLOW_TRACKING_URI (e.g. http://GCP_HOST:5000).
# If unset, tracking_uri_fallback is used (local SQLite metadata DB).
# Production: point the MLflow server at gs://… for --default-artifact-root and use
# GOOGLE_APPLICATION_CREDENTIALS (or ADC) on training and serving so artifacts use GCS.
mlflow:
  experiment_name:    vinyl_grader
  # Register transformer pyfunc after full pipeline train (models:/name/...)
  registry_model_name: VinylGrader
  register_after_pipeline: true
  tracking_uri_fallback: sqlite:///grader/experiments/mlflow.db
  tags:
    project:  vinyl_collector_ai
    module:   grader

# ------------------------------------------------------------
# Inference
# ------------------------------------------------------------
inference:
  model: transformer


# ------------------------------------------------------------
# Export
# ------------------------------------------------------------
# Paths for serialized model artifacts.
# All artifacts must be saved here for reproducibility —
# never save models to ad-hoc locations.
# ------------------------------------------------------------
export:
  onnx_path:                  grader/artifacts/model.onnx
  coreml_path:                grader/artifacts/VinylGrader.mlpackage
  preprocessing_pipeline_path: grader/artifacts/preprocessor.pkl
  label_encoder_path:         grader/artifacts/label_encoder.pkl
  tfidf_vectorizer_path:      grader/artifacts/tfidf_vectorizer.pkl
