# Vinyl Price Estimation – Base Config
# Reproducibility
seed: 42

# Paths (relative to price_estimation/)
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  artifacts: "artifacts"

# Discogs API – optional; historical sales often from CSV or external dumps
discogs:
  use_api: false
  # token: "${DISCOGS_USER_TOKEN}"
  # When use_api is false, sales and metadata are read from CSV in paths.raw_data

# Feature engineering
features:
  historical_years: 3
  time_decay_halflife_days: 365
  rolling_window_days: 180
  genre_top_k: 50
  condition_encode: "one_hot"  # one_hot | ordinal

# Baseline: Linear Regression
baseline:
  fit_intercept: true
  positive: false

# Advanced: Gradient Boosting (Phase 2)
gradient_boosting:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
  prediction_interval_quantiles: [0.1, 0.9]

# Train/val/test split (time-based)
split:
  val_fraction: 0.15
  test_fraction: 0.15
  time_column: "sale_date"

# Evaluation
evaluation:
  primary_metric: "mae"
  metrics:
    - mae
    - mape
  prediction_interval_coverage: 0.8

# Experiment tracking
mlflow:
  experiment_name: "price_estimation"
  tracking_uri: null
