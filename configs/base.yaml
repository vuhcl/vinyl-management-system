# ============================================================
# vinyl_collector_ai/configs/base.yaml
# Shared configuration — inherited by all feature modules
# ============================================================

project:
  name: vinyl_collector_ai
  version: "0.1.0"
  random_seed: 42

paths:
  root: .                          # monorepo root
  shared_data: data/
  raw: data/raw/
  processed: data/processed/
  artifacts: artifacts/

discogs:
  base_url: https://api.discogs.com
  token: ${DISCOGS_TOKEN}          # set via environment variable, never hardcoded
  rate_limit_per_minute: 60
  marketplace_endpoint: /marketplace/listings

ebay:
  base_url: https://api.ebay.com/buy/browse/v1
  token: ${EBAY_TOKEN}             # set via environment variable
  trusted_sellers: []              # populated in grader/configs/grader.yaml

mlflow:
  tracking_uri: ./experiments/mlruns
  artifact_location: ./artifacts