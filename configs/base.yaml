# ============================================================
# vinyl_collector_ai/configs/base.yaml
# Shared configuration — inherited by all feature modules
# ============================================================

project:
  name: vinyl_collector_ai
  version: "0.1.0"
  random_seed: 42

# ``data/raw/`` (repo root): Discogs collection/wantlist CSVs and ``.discogs_cache/``.
# Mount only this path in the **web** (or extension) image so it never needs
# ``recommender/``, ``grader/``, or ``price_estimator/``. Recommender + VinylIQ
# read the same root for dev fixtures or post-login sync. Processed parquets and
# optional AOTY scrape mirror stay under ``recommender/data/``. Grader and VinylIQ
# bulk trees remain ``grader/data/`` and ``price_estimator/data/``.
paths:
  root: .                          # monorepo root
  raw: data/raw/
  processed: recommender/data/processed/
  # Canonical keys for core.config.load_config resolution + core.jobs
  raw_data: data/raw/
  processed_data: recommender/data/processed/
  artifacts: artifacts/

discogs:
  base_url: https://api.discogs.com
  token: ${DISCOGS_TOKEN}          # set via environment variable, never hardcoded
  rate_limit_per_minute: 60
  marketplace_endpoint: /marketplace/listings

ebay:
  base_url: https://api.ebay.com/buy/browse/v1
  token: ${EBAY_TOKEN}             # set via environment variable
  trusted_sellers: []              # populated in grader/configs/grader.yaml

mlflow:
  # Remote tracking: set MLFLOW_TRACKING_URI in the environment.
  # Grader uses grader.yaml → tracking_uri_fallback when the env var is unset.
  artifact_location: ./artifacts