# VinylIQ / price_estimator — paths relative to price_estimator/ unless absolute
seed: 42

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  artifacts: "artifacts"

vinyliq:
  paths:
    marketplace_db: "price_estimator/data/cache/marketplace_stats.sqlite"
    feature_store_db: "data/feature_store.sqlite"
    sale_history_db: "data/cache/sale_history.sqlite"
    model_dir: "artifacts/vinyliq"
  # Which env var the API reads for the personal token (see repo .env.template).
  discogs_token_env: "DISCOGS_TOKEN"
  # null = auto from labeled count (cap ~ n/25, max 3000; keep all if ≤500 uniques)
  catalog_encoders:
    max_primary_artist_ids: null
    max_primary_label_ids: null
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.85
    colsample_bytree: 0.85
  # Training label: ``sale_floor_blend`` / ``sale_floor`` only (``load_training_frame``).
  # Sold nowcast + listing floor blend: ``sale_floor_targets.sale_floor_blend_bundle``;
  # needs ``paths.sale_history_db`` (sale_history.sqlite). ``price_suggestion_grade``
  # selects the NM ladder rung used inside that bundle (see plan §7.1d).
  training_label:
    mode: sale_floor_blend
    price_suggestion_grade: "Near Mint (NM or M-)"
    price_suggestion_fallback_lowest: true
    sale_floor_blend:
      # nm_substrings_only (default) | ordinal_cascade (relax VG+ then VG when NM pool is thin).
      sale_condition_policy: ordinal_cascade
      n_min_trend: 8
      # Longer half-life keeps older NM sales in the recency kernel (helps sparse cheap titles).
      recency_half_life_days: 420.0
      # Substrings for NM-tier sale rows (media+sleeve blob); extend for Discogs text variants.
      nm_substrings:
        - "near mint"
        - "(nm"
        - "mint (m"
        - "nm or m-"
      w_base: 0.55
      w_min: 0.2
      w_max: 0.9
      tier_b_delta: 0.05
      tier_c_delta: 0.1
      gap_epsilon_log: 0.02
      gap_k_down: 0.15
      gap_k_up: 0.12
      gap_delta_cap: 0.5
      # Caps toxic listing floors / extrapolated nowcasts (``sale_floor_targets``).
      label_cap:
        enabled: true
        sale_nowcast_max_multiple_of_max_price: 10.0
        listing_max_multiple_of_sale_peak: 15.0
        y_max_multiple_of_sale_peak: 15.0
        y_max_multiple_of_anchor_m: 30.0
        listing_max_multiple_of_median_only: 40.0
      # Merged into ``sale_floor_blend`` (see ``sale_floor_blend_config_from_raw``).
      ordinal_cascade:
        strict_min_ordinal: 7.0
        relax_steps: [6.0, 5.0]
        min_rows_strict: 8
        min_rows_relax_1: 5
        min_rows_relax_2: 6
        apply_grade_uplift_to_nm: true
        condition_adjustment:
          alpha: -0.06
          beta: -0.04
          ref_grade: 8.0
        grade_delta_scale:
          price_ref_usd: 50.0
          price_gamma: 0.0
          price_scale_min: 0.25
          price_scale_max: 4.0
          age_k: 0.0
          age_center_year: 2000.0
  # residual_log_median (default): y = log1p(y_label) - log1p(anchor); anchor prefers
  # release_lowest_price then stats lowest/median; X omits price/liquidity; inference
  # adds log1p(live anchor). Pyfunc column name remains ``discogs_median_price``.
  # dollar_log1p: predict log1p(price) with marketplace scalars in X (legacy).
  # residual_z_clip_abs: optional positive float; clip z=log1p(y_label)-log1p(median) to [-c,c].
  training_target:
    kind: residual_log_median
    residual_z_clip_abs: null
  # Two-head NM-substrings + ordinal-cascade ensemble (sigmoid blend on log1p anchor).
  # Requires tuning.enabled. Each head fits on rows where that policy yields a label (like production: both heads score every row).
  ensemble:
    enabled: true
    blend:
      kind: log_anchor_sigmoid
      t: 4.0
      s: 0.35
    # After both heads are fit, optionally grid-search (t,s) on the inner val set only
    # using the same objective as tuning.selection_metric (no retraining).
    blend_sweep:
      enabled: true
      t: [3.0, 4.0, 5.0, 6.0]
      s: [0.25, 0.35, 0.5]
    # Or explicit pairs: pairs: [[3.5, 0.3], [4.0, 0.35]]
    share_hparams: true
  tuning:
    enabled: true
    # Release-level CV on outer-train for trial scoring (1 = legacy single inner val split).
    cv_folds: 5
    cv_agg: mean
    # null | anchor_quartile (stratify folds by release median anchor quartiles).
    cv_stratify: anchor_quartile
    # Hard caps on aggregated CV val metrics (fractions of 1). Feasible trials compete on
    # selection_metric; if none pass, violation_fallback applies.
    constraints:
      enabled: true
      mdape_max: 0.03
      wape_max: 0.15
      violation_fallback: best_violation
    constraint_penalty:
      lambda_mdape: 100.0
      lambda_wape: 1000.0
    # Champion trial: median_ape | wape | mae_dollars | composite (with selection_composite).
    selection_metric: composite
    selection_composite:
      w_mdape: 1.0
      w_wape: 0.3
      w_mae: 0.1
      mae_ref_usd: 20.0
    n_trials_per_family: 8
    val_fraction: 0.15
    test_fraction: 0.15
    early_stopping_rounds: 50
    # null = use top-level ``seed``
    random_seed: null
    # Optional per-row fit weights: null | inv_sqrt_anchor (upweight low-dollar anchors).
    sample_weight: null
  model_families:
    xgboost: true
    lightgbm: true
    catboost: true
    sklearn_hist_gbrt: true
    sklearn_rf: false
    sklearn_et: false
  search_spaces:
    xgboost:
      objective: ["reg:squarederror", "reg:absoluteerror", "reg:quantileerror"]
      n_estimators: [400, 800, 1200]
      max_depth: [4, 5, 6, 8]
      learning_rate: [0.03, 0.05, 0.08]
      subsample: [0.75, 0.85, 0.95]
      colsample_bytree: [0.75, 0.85, 0.95]
      reg_lambda: [0.5, 1.0, 2.0]
      reg_alpha: [0.0, 0.1, 0.5]
    lightgbm:
      objective: ["regression", "regression_l1", "quantile"]
      n_estimators: [400, 800, 1200]
      num_leaves: [31, 63, 127]
      learning_rate: [0.03, 0.05, 0.08]
      subsample: [0.75, 0.85, 0.95]
      colsample_bytree: [0.75, 0.85, 0.95]
      min_child_samples: [10, 20, 40]
    catboost:
      iterations: [400, 800, 1200]
      depth: [4, 6, 8]
      learning_rate: [0.03, 0.05, 0.08]
      l2_leaf_reg: [1, 3, 5]
      bagging_temperature: [0, 0.5, 1]
    sklearn_hist_gbrt:
      max_iter: [200, 400, 600]
      max_depth: [null, 6, 8]
      learning_rate: [0.03, 0.05, 0.1]
      l2_regularization: [0.0, 0.1, 1.0]
      max_leaf_nodes: [31, 63]
      min_samples_leaf: [10, 20]
    sklearn_rf:
      n_estimators: [200, 400]
      max_depth: [null, 12, 20]
      min_samples_leaf: [1, 4]
    sklearn_et:
      n_estimators: [200, 400]
      max_depth: [null, 12, 20]
      min_samples_leaf: [1, 4]

api:
  host: "0.0.0.0"
  port: 8801

discogs:
  use_api: true

# Same pattern as grader/configs/grader.yaml: set MLFLOW_TRACKING_URI to your
# remote server (artifact root on that server should be gs://… like grader).
# Local fallback shares grader/experiments/mlflow.db when env is unset.
mlflow:
  # false = no tracking. log_artifacts: false = metrics/params only (saves GCS storage).
  enabled: true
  log_artifacts: true
  experiment_name: "vinyl_price_estimator"
  # Optional: path to GCP service account JSON for GCS artifact uploads (remote
  # tracking server with gs:// artifact root). Relative to repo root unless absolute.
  # Ignored if GOOGLE_APPLICATION_CREDENTIALS already points to a valid file.
  google_application_credentials: null
  tracking_uri_fallback: "sqlite:///grader/experiments/mlflow.db"
  registry_model_name: "VinylIQPrice"
  register_best_model: true
  staging_alias: staging
  promote_production: false
  production_alias: production
  tags:
    project: vinyl_collector_ai
    module: price_estimator
