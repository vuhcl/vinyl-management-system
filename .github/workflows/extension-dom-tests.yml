# Extension DOM contract tests (path-filtered CI).

name: Extension DOM tests

on:
  pull_request:
    paths:
      - "vinyliq-extension/**"
  push:
    branches: [main]
    paths:
      - "vinyliq-extension/**"

permissions:
  contents: read

jobs:
  dom-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: vinyliq-extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vinyliq-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run listing_dom contract tests
        run: npm test
