# Path-based routing: /grader/* -> grader-api, /price/* -> price-api.
#
# Each rule uses a `URLRewrite` filter to strip the prefix before
# forwarding so the upstream FastAPI routes (`/health`, `/predict`,
# `/estimate`) match unchanged. This is the routing contract baked into
# the Chrome extension popup defaults: priceApiBase ends in `/price`,
# graderApiBase ends in `/grader`.
#
# Render via: envsubst < httproute.yaml | kubectl apply -f -
# Required env: DEMO_HOSTNAME (e.g. 35-1-2-3.nip.io).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vinyl-demo-routes
  namespace: vinyl-demo
spec:
  parentRefs:
    - name: vinyl-demo-gw
  hostnames:
    - ${DEMO_HOSTNAME}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grader
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: grader-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /price
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: price-api
          port: 8801
