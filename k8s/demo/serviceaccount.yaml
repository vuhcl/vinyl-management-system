# Workload Identity binding for both APIs.
#
# RUNTIME_GSA must be exported before `envsubst < serviceaccount.yaml | kubectl apply -f -`.
# The corresponding Google service account binding (KSA -> GSA) is created
# imperatively during Phase 4 bootstrap; see k8s/demo/README.md.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vinyl-runtime
  namespace: vinyl-demo
  annotations:
    iam.gke.io/gcp-service-account: ${RUNTIME_GSA}
