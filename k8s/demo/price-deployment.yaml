# Price API (XGBoost FittedVinylIQRegressor + Memorystore Redis cache).
#
# Mounts:
#   - /data           PVC (vinyl-price-data) with SQLite + trained model
#   - /etc/vinyliq    ConfigMap (price-config) overriding vinyliq.paths
#
# VINYLIQ_CONFIG is hard-coded to the ConfigMap mount path so the API does
# not have to be invoked with a flag and the path stays out of the image.
#
# Render via: envsubst < price-deployment.yaml | kubectl apply -f -
# Required env: GCP_REGION, GCP_PROJECT_ID, AR_REPO (default vinyl-images),
# IMAGE_TAG (default :demo).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-api
  namespace: vinyl-demo
  labels:
    app: price-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-api
  template:
    metadata:
      labels:
        app: price-api
    spec:
      serviceAccountName: vinyl-runtime
      containers:
        - name: price
          image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/price:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8801
          env:
            - name: VINYLIQ_CONFIG
              value: /etc/vinyliq/config.yaml
          envFrom:
            - secretRef:
                name: vinyl-redis
            - secretRef:
                name: vinyl-discogs
            - configMapRef:
                name: vinyl-config
          volumeMounts:
            - name: data
              mountPath: /data
            - name: price-config
              mountPath: /etc/vinyliq
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "3Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vinyl-price-data
        - name: price-config
          configMap:
            name: price-config
            items:
              - key: config.yaml
                path: config.yaml
