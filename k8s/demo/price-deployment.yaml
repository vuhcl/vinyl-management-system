# Price API (XGBoost FittedVinylIQRegressor + Memorystore Redis cache).
#
# Mounts:
#   - /data/artifacts PVC (vinyl-price-data): optional locals / MLflow cache
#   - /etc/vinyliq    ConfigMap (price-config): postgres_dsn_env (+ model_dir if local-only)
#
# Cloud SQL: cloudsql-proxy sidecar on 127.0.0.1:5432; DATABASE_URL from
# vinyl-cloudsql secret (must match proxy port).
#
# VINYLIQ_CONFIG is hard-coded to the ConfigMap mount path so the API does
# not have to be invoked with a flag and the path stays out of the image.
#
# Render via: envsubst < price-deployment.yaml | kubectl apply -f -
# Required env: GCP_REGION, GCP_PROJECT_ID, AR_REPO (default vinyl-images),
# IMAGE_TAG (default :demo).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-api
  namespace: vinyl-demo
  labels:
    app: price-api
spec:
  progressDeadlineSeconds: 900
  replicas: 1
  selector:
    matchLabels:
      app: price-api
  template:
    metadata:
      labels:
        app: price-api
    spec:
      serviceAccountName: vinyl-runtime
      containers:
        - name: price
          image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/price:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8801
          env:
            - name: VINYLIQ_CONFIG
              value: /etc/vinyliq/config.yaml
          envFrom:
            - secretRef:
                name: vinyl-price-mlflow
            - secretRef:
                name: vinyl-redis
            - secretRef:
                name: vinyl-discogs
            - secretRef:
                name: vinyl-cloudsql
            - configMapRef:
                name: vinyl-config
          volumeMounts:
            - name: data
              mountPath: /data/artifacts
            - name: price-config
              mountPath: /etc/vinyliq
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: http
            # First request loads model + pools; default 1s probe timeout is too tight.
            timeoutSeconds: 120
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "3Gi"

        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          args:
            - "--structured-logs"
            - "--port=5432"
            - "${GCP_PROJECT_ID}:${GCP_REGION}:vinyl-demo-db"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              memory: "128Mi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vinyl-price-data
        - name: price-config
          configMap:
            name: price-config
            items:
              - key: config.yaml
                path: config.yaml
