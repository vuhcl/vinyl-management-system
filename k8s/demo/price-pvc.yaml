# Price API persistent volume (model artifacts only).
#
# Feature store + marketplace_stats live in Cloud SQL. This PVC mounts at
# `/data/artifacts` and holds only trained VinylIQ assets:
#   - /data/artifacts/vinyliq/   (xgb_model.joblib, encoders, grade deltas)
#
# 5 Gi is enough for typical joblib + JSON; bump if needed. Existing clusters
# cannot shrink PVC in-place — a previously expanded PVC keeps its size.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vinyl-price-data
  namespace: vinyl-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
