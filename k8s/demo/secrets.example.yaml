# Inventory ONLY — do not apply this file. Real secret values are created
# imperatively via `kubectl create secret generic ...` from `.env` during
# Phase 4 bootstrap; see k8s/demo/README.md.
#
# Listing the Secret resources here is intentional: it makes the
# secret-shape contract reviewable in code without leaking values, and
# `kubectl diff` can use it as a sanity check that the bootstrap commands
# created the right keys.
---
apiVersion: v1
kind: Secret
metadata:
  name: vinyl-mlflow
  namespace: vinyl-demo
type: Opaque
stringData:
  # Used by the grader API at runtime (mlflow.pyfunc.load_model on startup).
  MLFLOW_TRACKING_URI: "REPLACE_AT_BOOTSTRAP"
  MLFLOW_MODEL_URI: "REPLACE_AT_BOOTSTRAP"
---
apiVersion: v1
kind: Secret
metadata:
  name: vinyl-price-mlflow
  namespace: vinyl-demo
type: Opaque
stringData:
  # Price API: same tracking host as grader; model URI is models:/... or runs:/...
  MLFLOW_TRACKING_URI: "REPLACE_AT_BOOTSTRAP"
  VINYLIQ_MLFLOW_MODEL_URI: "REPLACE_AT_BOOTSTRAP"
---
apiVersion: v1
kind: Secret
metadata:
  name: vinyl-redis
  namespace: vinyl-demo
type: Opaque
stringData:
  # Memorystore (Basic tier, no AUTH) private IP from `gcloud redis instances
  # describe ... --format='value(host)'`. The price-api reads REDIS_HOST,
  # REDIS_PORT, REDIS_DB, REDIS_TTL_SECONDS — all driven by env vars.
  REDIS_HOST: "REPLACE_AT_BOOTSTRAP"
---
apiVersion: v1
kind: Secret
metadata:
  name: vinyl-discogs
  namespace: vinyl-demo
type: Opaque
stringData:
  # Used by the price-api on cache miss (Discogs `/releases/{id}`).
  DISCOGS_USER_TOKEN: "REPLACE_AT_BOOTSTRAP"
---
apiVersion: v1
kind: Secret
metadata:
  name: vinyl-cloudsql
  namespace: vinyl-demo
type: Opaque
stringData:
  # Postgres DSN; pod resolves via cloud-sql-proxy sidecar on 127.0.0.1:5432.
  DATABASE_URL: "REPLACE_AT_BOOTSTRAP"
