<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; font-family: system-ui, sans-serif; font-size: 13px; padding: 10px; box-sizing: border-box; margin: 0; }
    .hint { font-size: 11px; color: #666; margin-top: 6px; margin-bottom: 0; }
    .err { color: #b00; font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
    button { margin-top: 12px; width: 100%; padding: 8px; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    button.hidden { display: none; margin-top: 0; }
    a.options-link { display: inline-block; margin-top: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <strong>VinylIQ</strong>
  <p class="hint" id="release-line">Detecting Discogs tab…</p>

  <button type="button" id="grade" class="hidden">Grade condition</button>
  <button type="button" id="estimate">Get estimate</button>
  <a href="#" id="open-options" class="options-link">Options (API backends & key)</a>
  <div class="hint">On seller drafts (<code>/sell/post/</code>): use the <strong>VinylIQ panel docked</strong> to the listing page so controls stay visible while you edit. Toolbar popup repeats the same actions.</div>

  <div class="err" id="err"></div>
  <script src="popup.js"></script>
</body>
</html>
