<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VinylIQ — Options</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 24px auto; padding: 0 16px; }
    label { display: block; margin-top: 16px; font-weight: 600; }
    input[type="text"], input[type="password"] {
      width: 100%; box-sizing: border-box; padding: 8px; margin-top: 6px;
    }
    button { margin-top: 18px; padding: 10px 16px; cursor: pointer; }
    .hint { font-size: 12px; color: #666; margin-top: 6px; }
    #status { margin-top: 12px; font-size: 13px; color: #080; min-height: 1.25em; }
  </style>
</head>
<body>
  <h1>VinylIQ options</h1>
  <p class="hint">Defaults come from bundled <code>defaults.js</code> / dev localhost unless you override here.</p>

  <label for="priceApiBase">Price API base URL</label>
  <input type="text" id="priceApiBase" autocomplete="off" placeholder="http://127.0.0.1:8801" />
  <p class="hint">POST …/estimate for listing suggestions.</p>

  <label for="graderApiBase">Grader API base URL</label>
  <input type="text" id="graderApiBase" autocomplete="off" placeholder="http://127.0.0.1:8090" />
  <p class="hint">POST …/predict for condition grading.</p>

  <label for="apiKey">Optional API key (X-API-Key)</label>
  <input type="password" id="apiKey" autocomplete="new-password" />
  <p class="hint">Still recoverable locally; avoids plain display in toolbar.</p>

  <button type="button" id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
